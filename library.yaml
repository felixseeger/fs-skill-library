default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: mcp-skill-creator
      description: Meta-skill for creating workflow-optimized skills from MCP servers
      source: https://github.com/nemori-ai/skills/blob/main/mcp-skill-creator/SKILL.md

    - name: skill-customizer
      description: Customize existing skills through iterative improvement based on user feedback and preferences
      source: https://github.com/nemori-ai/skills/blob/main/skill-customizer/SKILL.md

  agents: []
  prompts: []
